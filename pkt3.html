<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Punkt 3</title>

  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      overflow: hidden;
    }

    .background {
      position: fixed;
      width: 100%;
      height: 100%;
      background-image: url('grupa.jpeg');
      background-size: cover;
      background-position: center;
      filter: brightness(0.4);
      z-index: -1;
    }

    .content {
      position: relative;
      top: 50%;
      transform: translateY(-50%);
      padding: 20px;
    }

    h1 {
      font-size: 28px;
    }

    p {
      font-size: 18px;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="background"></div>

<div class="content">
  <h1>Punkt 3</h1>
  <p>
    Stwórz szkic okolicy i określ powierchnię zmapowanego terenu.<br><br>
    Jak dobrze przeniść wymiary na szkic? Jak mierzyć odległości? Jak mierzyć kąty?
  </p>
</div>

</body>
</html>
